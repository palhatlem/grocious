# grocery — self-hosted Norwegian grocery bonus tooling.
# Secrets + tokens live OUTSIDE this repo at /srv/docker/grocery/ (.env + data/).
services:
  trumf-fetch:
    build: .
    image: grocery-fetch:latest
    container_name: grocery-trumf-fetch
    command: ["trumf_client.py"]
    env_file: /srv/docker/grocery/.env
    environment: [TRUMF_STATE=/data/trumf_state.json, TZ=Europe/Oslo]
    volumes: [/srv/docker/grocery/data:/data]
    restart: "no"

  rema-fetch:
    build: .
    image: grocery-fetch:latest
    container_name: grocery-rema-fetch
    command: ["rema_client.py"]        # fetches + AUTO-ACTIVATES all available offers
    env_file: /srv/docker/grocery/.env
    environment: [REMA_DATA=/data, TZ=Europe/Oslo]
    volumes: [/srv/docker/grocery/data:/data]
    restart: "no"

  # (re)login — interactive, enter the SMS code when prompted. Run when tokens expire.
  trumf-login:
    build: ./login
    image: grocery-login:latest
    command: ["trumf_login.py"]
    profiles: ["login"]
    env_file: /srv/docker/grocery/.env
    environment: [PLAYWRIGHT_BROWSERS_PATH=/ms-playwright]
    volumes: [/srv/docker/grocery:/work, /srv/docker/grocery/data:/data]

  rema-login:
    build: ./login
    image: grocery-login:latest
    command: ["rema_login.py"]
    profiles: ["login"]
    env_file: /srv/docker/grocery/.env
    environment: [PLAYWRIGHT_BROWSERS_PATH=/ms-playwright]
    volumes: [/srv/docker/grocery:/work, /srv/docker/grocery/data:/data]
